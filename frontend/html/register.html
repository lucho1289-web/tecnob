<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>SampleVault - Registro</title>
    <link rel="stylesheet" href="../css/w3.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
</head>

<body class="w3-display-container" style="height:100vh;">
    <div class="w3-display-middle w3-mobile" style="width:400px;">
        <div class="w3-card-4 vault-card w3-padding-large w3-round-large">
            <h2 class="w3-center w3-text-yellow"><b>CREAR CUENTA</b></h2>
            <form id="registerForm">
                <label>Nombre de Usuario</label>
                <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="text" id="username"
                    required>
                <br>
                <label>Contraseña</label>
                <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="password" id="password"
                    required>
                <br>
                <button type="submit" class="w3-button w3-yellow w3-block w3-round-large"><b>REGISTRARSE</b></button>
            </form>
            <p class="w3-small w3-center">¿Ya tienes cuenta? <a
                    href="https://musical-computing-machine-7vg76r6x5pp5fr7gj-3000.app.github.dev/html/login.html"
                    class="w3-text-yellow">Inicia Sesión</a></p>
        </div>
    </div>

    <script src="../js/services/apiService.js"></script>
    <script src="../js/components/uiHandlers.js"></script>
    <script src="../js/utils/authHelper.js"></script>
    <script src="../js/frontControllers/authFrontController.js"></script>

    <div id="errorModal" class="w3-modal" style="display:none;">
        //
        <div class="w3-modal-content w3-card-4 w3-animate-zoom w3-dark-grey w3-border w3-border-red w3-round-large"
            style="max-width:400px;">
            <header class="w3-container w3-red">
                <span onclick="document.getElementById('errorModal').style.display='none'"
                    class="w3-button w3-display-topright w3-large">&times;</span>
                <h4>Error de Validación</h4>
            </header>
            <div class="w3-container w3-padding-16">
                <p id="errorModalMessage" class="w3-text-white"></p>
            </div>
            <footer class="w3-container w3-padding-8 w3-right-align">
                <button onclick="document.getElementById('errorModal').style.display='none'"
                    class="w3-button w3-red w3-round">Cerrar</button>
            </footer>
        </div>
    </div>
    //
</body>

</html>
>
